<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Cat's Socktopia</title>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    <style>
      /* Body styling */
      body {
        background-image: url('https://webtinq.nl/testjsjsjjsjsjsjsjs/afbeeldingen/IMG_2313.jpeg');
        font-family: "Chewy", sans-serif;
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        margin: 0;
        padding: 0;
      }

      /* Main title div */
      .divtitle {
        border: solid black 5px;
        background-color: white;
        text-align: center;
        padding: 20px;
        margin: 40px auto;
        width: 80%;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        border-radius: 15px;
      }

      /* Headings and paragraph styling */
      h1 {
        margin-top: 0;
      }

      p {
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="divtitle">
      <h1>Welcome to Socktopia, the kingdom of Cat the 1st.</h1>
      <p>Cat: This is my "website", courtesy of human ruler Me. You may gaze upon my literature, entertaining games, and more.</p>
    </div>
  </body>
</html>
