<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cat's Socktopia</title>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: "Chewy", sans-serif;
      background-image: url('https://webtinq.nl/testjsjsjjsjsjsjsjs/afbeeldingen/IMG_2313.jpeg');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      display: flex;
      flex-direction: column;
    }

    .divtitle {
      border: solid black 5px;
      background-color: white;
      text-align: center;
      padding: 20px;
      margin: 40px auto;
      width: 80%;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      border-radius: 15px;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center; /* centers horizontally */
      gap: 40px; /* space between cards */
      flex-wrap: wrap; /* allows wrapping on smaller screens */
      padding: 20px;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      text-align: center;
      width: 300px;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-size: 1.5em;
      text-decoration: none; /* remove underline from links */
      color: #000;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,0,0,0.7);
    }

    .tunaclickergame {
      background-color: #4AA5E0;
      border: solid #2B7DB5 5px;
    }

    .catstories {
      background-color: #EED9C4;
      border: solid #A67B5B 5px;
    }

    footer {
      background-color: white;
      text-align: center;
      padding: 10px;
      border-top: solid black 3px;
    }

  </style>
</head>
<body>

  <div class="divtitle">
    <h1>Welcome to Socktopia, the kingdom of Cat the 1st.</h1>
    <p>Cat: This is my "website", courtesy of human ruler Me. You may gaze upon my literature, entertaining games, and more.</p>
  </div>

  <main>
    <a href="games.html" class="card tunaclickergame">
      🐟 Tuna Story Game! 🐟
    </a>

    <a href="stories.html" class="card catstories">
      📔 Cat's Stories! 📔
    </a>
  </main>

  <footer>
    &copy; 2026 Socktopia – All rights reserved by Your Socktopian Cat Majesty 🐾
  </footer>

</body>
</html>
